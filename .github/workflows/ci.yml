name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w anonimizator
      - run: npm run test -w anonimizator
      - run: npx tsc -p apps/web/tsconfig.json
      - run: npm run test -w anonimizator-web
      - run: npm run build -w anonimizator-web
