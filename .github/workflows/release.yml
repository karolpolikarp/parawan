name: Release

# Tag `v*` (np. v0.1.0) → buduje aplikację webową i dołącza do GitHub Release
# ZIP gotowy do użycia offline: rozpakuj i otwórz index.html podwójnym kliknięciem.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w anonimizator
      - run: npm run test -w anonimizator
      - run: npm run build -w anonimizator-web
      - name: Dodaj instrukcję do paczki
        run: |
          cat > apps/web/dist/JAK-UZYC.txt <<'EOF'
          ANONIMIZATOR — jak zacząć (30 sekund)

          1. Otwórz plik index.html podwójnym kliknięciem (uruchomi się w przeglądarce).
          2. Wklej tekst albo upuść plik (.txt lub .docx) na lewe pole.
          3. Po prawej masz wersję z zamaskowanymi danymi — kliknij „Kopiuj".

          Wszystko dzieje się na Twoim komputerze. Aplikacja nie łączy się
          z internetem — możesz wyłączyć Wi-Fi i sprawdzić.

          Uwaga: wykrywanie imion i nazwisk jest heurystyczne — zawsze przejrzyj
          wynik, zanim go komuś wyślesz.

          Kod źródłowy i dokumentacja:
          https://github.com/karolpolikarp/anonimizator
          EOF
      - name: Spakuj aplikację offline
        run: cd apps/web/dist && zip -r ../../../anonimizator-offline.zip .
      - uses: softprops/action-gh-release@v3
        with:
          files: anonimizator-offline.zip
          body: |
            **anonimizator-offline.zip** — aplikacja do użycia lokalnie, bez internetu:
            1. Pobierz i rozpakuj ZIP.
            2. Otwórz `index.html` w przeglądarce (podwójny klik).
            3. Wklej tekst — anonimizacja odbywa się w całości na Twoim komputerze.
