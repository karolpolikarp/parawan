name: Release

# Tag `v*` (np. v0.1.0) → buduje samowystarczalny plik HTML i dołącza do GitHub Release.
# Jeden plik gotowy do użycia offline: pobierz i otwórz podwójnym kliknięciem.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w anonimizator
      - run: npm run test -w anonimizator
      # Jeden produkt: samowystarczalny HTML, file://, zero instalacji i uruchamiania.
      # Warstwa AI (rzadkie/obce nazwiska) żyje osobno: github.com/karolpolikarp/anonimizator-ai
      - name: Zbuduj aplikację (samowystarczalny HTML)
        run: npm run build -w anonimizator-web
      - name: Przygotuj artefakt (plik + instrukcja)
        run: |
          cp apps/web/dist/index.html Parawan.html
          cat > JAK-UZYC.txt <<'EOF'
          PARAWAN: jak zacząć (30 sekund)

          „Dane za parawanem", lokalny anonimizator polskich danych osobowych.

          1. Otwórz plik Parawan.html podwójnym kliknięciem (uruchomi się w przeglądarce).
          2. Wklej tekst albo upuść plik (.txt, .docx lub .pdf) na lewe pole.
          3. Po prawej masz wersję z zamaskowanymi danymi, kliknij „Kopiuj".

          Wszystko dzieje się na Twoim komputerze. Aplikacja nie łączy się
          z internetem, możesz wyłączyć Wi-Fi i sprawdzić.

          Uwaga: automat bywa niepełny (zwłaszcza rzadkie nazwiska), zawsze przejrzyj
          wynik, zanim go komuś wyślesz.

          Kod źródłowy:
          https://github.com/karolpolikarp/parawan
          EOF
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            Parawan.html
            JAK-UZYC.txt
          body: |
            ### `Parawan.html`: jeden plik, zero instalacji

            **Parawan**, „Dane za parawanem". Pobierz i otwórz podwójnym kliknięciem, działa nawet
            na komputerach z blokadami firmowymi (nie wymaga `.bat` ani serwera).
            Anonimizacja regułami, słownikami i sumami kontrolnymi, w całości offline, **bez AI**
            (możesz wyłączyć internet i sprawdzić).

            Potrzebujesz wyższego wykrywania rzadkich/obcych nazwisk? Opcjonalny dodatek
            (local-only): [anonimizator-ai](https://github.com/karolpolikarp/anonimizator-ai).
