name: Release

# Tag `v*` (np. v0.1.0) → buduje aplikację webową i dołącza do GitHub Release
# ZIP gotowy do użycia offline: rozpakuj i otwórz index.html podwójnym kliknięciem.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w anonimizator
      - run: npm run test -w anonimizator
      # ── Edycja 1: „czysty HTML / urząd" — jeden plik, file://, bez AI, bez uruchamiania ──
      # Dla maszyn z blokadami firmowymi (nie da się odpalić .bat ani serwera).
      - name: Zbuduj aplikację (edycja „urzędnik" — bez warstwy AI/NER)
        run: npm run build -w anonimizator-web
        env:
          VITE_EDITION: urzednik
      - name: Przygotuj artefakt „czysty HTML" (sam plik + instrukcja)
        run: |
          cp apps/web/dist/index.html Anonimizator.html
          cat > JAK-UZYC.txt <<'EOF'
          ANONIMIZATOR — jak zacząć (30 sekund)

          1. Otwórz plik Anonimizator.html podwójnym kliknięciem (uruchomi się w przeglądarce).
          2. Wklej tekst albo upuść plik (.txt, .docx lub .pdf) na lewe pole.
          3. Po prawej masz wersję z zamaskowanymi danymi — kliknij „Kopiuj".

          Wszystko dzieje się na Twoim komputerze. Aplikacja nie łączy się
          z internetem — możesz wyłączyć Wi-Fi i sprawdzić.

          Uwaga: automat bywa niepełny (zwłaszcza rzadkie nazwiska) — zawsze przejrzyj
          wynik, zanim go komuś wyślesz.

          Kod źródłowy:
          https://github.com/karolpolikarp/anonimizator
          EOF
      # ── Edycja 2: „pełna / AI" — HTML z sekcją AI + launcher HTTP (dla maszyn bez blokad) ──
      # UWAGA: build MUSI iść PO skopiowaniu Anonimizator.html, bo nadpisuje dist/index.html.
      - name: Zbuduj aplikację (edycja pełna — z warstwą AI/NER)
        run: npm run build -w anonimizator-web
      - name: Przygotuj artefakt „pełna / AI" (HTML + launcher + instrukcja)
        run: |
          mkdir -p Anonimizator-AI
          cp apps/web/dist/index.html Anonimizator-AI/index.html
          cp launcher/START-ANONIMIZATOR.bat launcher/serve.ps1 Anonimizator-AI/
          cat > Anonimizator-AI/JAK-UZYC-AI.txt <<'EOF'
          ANONIMIZATOR (wersja z AI) — dokładniejsze wykrywanie nazwisk, bez Dockera

          Ta wersja dokłada rzadkie i odmienione nazwiska modelem AI działającym W CAŁOŚCI
          na Twoim komputerze (tekst nie jest nigdzie wysyłany). Wymaga uruchomienia
          mini-serwera lokalnego, bo przeglądarki blokują modele AI dla plików z dysku.
          Jeśli na Twoim komputerze nie możesz uruchamiać plików .bat — użyj zamiast tego
          wersji „czysty HTML" (Anonimizator.html), która działa bez uruchamiania.

          1. Rozpakuj to archiwum do dowolnego folderu.
          2. Pobierz paczkę modelu (~190 MB) z zakładki Releases → „models-fastpdn-onnx-v1"
             i rozpakuj jej zawartość OBOK index.html — pojawią się foldery vendor/ i models/.
          3. Uruchom START-ANONIMIZATOR.bat (podwójny klik). Otworzy się przeglądarka
             pod http://127.0.0.1:8123.
          4. W sekcji „Wykrywanie nazwisk AI" przestaw przełącznik na „Włącz AI".
             Status zmieni się na „aktywny ✓". Zamknięcie okna konsoli zatrzymuje aplikację.

          Bez pobrania paczki modelu warstwa AI po prostu się nie pojawia — reguły, słowniki
          i sumy kontrolne działają i tak.

          Kod źródłowy: https://github.com/karolpolikarp/anonimizator
          EOF
          zip -r Anonimizator-AI.zip Anonimizator-AI
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            Anonimizator.html
            JAK-UZYC.txt
            Anonimizator-AI.zip
          body: |
            **Anonimizator — dwie wersje. Wybierz jedną:**

            ### `Anonimizator.html` — wersja „czysty HTML" (zalecana dla urzędów)
            Jeden plik, zero instalacji i zero uruchamiania. Otwórz podwójnym kliknięciem —
            działa nawet na komputerach z blokadami firmowymi (nie wymaga `.bat` ani serwera).
            Anonimizacja regułami, słownikami i sumami kontrolnymi, w całości offline.

            ### `Anonimizator-AI.zip` — wersja „pełna / AI" (komputery bez blokad)
            To samo + model AI, który dokłada rzadkie i odmienione nazwiska, działając
            wyłącznie na Twoim komputerze (tekst nie opuszcza przeglądarki). Wymaga
            uruchomienia dołączonego `START-ANONIMIZATOR.bat` (mini-serwer `127.0.0.1`,
            bo przeglądarki blokują modele AI dla plików `file://`) oraz pobrania paczki
            modelu z release'u `models-fastpdn-onnx-v1`. Instrukcja: `JAK-UZYC-AI.txt` w zipie.
