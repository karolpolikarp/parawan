      <stop offset="0" stop-color="#F3F1EA"/>
      <stop offset="1" stop-color="#EAE7DE"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="278" rx="26" fill="url(#bg)" stroke="#E1DED3" stroke-width="2"/>
  <!-- kafelek ikony (jasny) — znak w kolorach marki, NIEodwrócony -->
  <rect x="60" y="64" width="152" height="152" rx="34" fill="#FFFFFF" stroke="#E1DED3" stroke-width="2"/>
  <!-- znak ParawanMark (parawan-harmonijka z góry) — ciemna zieleń jak w aplikacji -->
  <svg x="86" y="94" width="100" height="92" viewBox="14 48 292 235" preserveAspectRatio="xMidYMid meet">
    <polygon points="30,74 95,112 95,270 30,232" fill="#0B3D2E"/>
    <polygon points="95,112 160,74 160,232 95,270" fill="#859E97"/>
    <polygon points="160,74 225,112 225,270 160,232" fill="#0B3D2E"/>
    <polygon points="225,112 290,74 290,232 225,270" fill="#859E97"/>
    <path d="M30 74 L95 112 L160 74 L225 112 L290 74" fill="none" stroke="#0B3D2E" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="30" y1="56" x2="30" y2="232" stroke="#0B3D2E" stroke-width="14" stroke-linecap="round"/>
    <line x1="95" y1="94" x2="95" y2="270" stroke="#0B3D2E" stroke-width="14" stroke-linecap="round"/>
    <line x1="160" y1="56" x2="160" y2="232" stroke="#0B3D2E" stroke-width="14" stroke-linecap="round"/>
    <line x1="225" y1="94" x2="225" y2="270" stroke="#0B3D2E" stroke-width="14" stroke-linecap="round"/>
    <line x1="290" y1="56" x2="290" y2="232" stroke="#0B3D2E" stroke-width="14" stroke-linecap="round"/>
